<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policy Data</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f4f6f8; color: #1a1a2e; padding: 1.5rem; line-height: 1.5; }
    .container { max-width: 960px; margin: 0 auto; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
    h1 { font-size: 1.4rem; }
    a.back { color: #2563eb; text-decoration: none; font-size: 0.9rem; }
    a.back:hover { text-decoration: underline; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.35rem; }
    .meta { color: #64748b; font-size: 0.85rem; margin-bottom: 0.75rem; }
    .summary { background: #eff6ff; border-left: 4px solid #2563eb; padding: 0.75rem 1rem; border-radius: 0 6px 6px 0; margin-bottom: 0.75rem; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 1rem; }
    th, td { padding: 0.65rem 0.85rem; text-align: left; border-bottom: 1px solid #e8ecf0; font-size: 0.85rem; }
    th { background: #2563eb; color: #fff; font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    ul { margin-left: 1.25rem; font-size: 0.9rem; }
    li { margin-bottom: 0.3rem; }
    .link-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.5rem 0.85rem;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .link-btn:hover { background: #1d4ed8; }
    .json-section { margin-top: 2rem; }
    .json-section h2 { font-size: 1rem; margin-bottom: 0.5rem; color: #555; }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.75rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Policy Data</h1>
      <a class="back" href="index.html">← Back to Home</a>
    </header>

    <div id="policy-content"></div>

    <div class="json-section">
      <h2>Raw JSON (for agent fetch)</h2>
      <pre id="json-output"></pre>
    </div>
  </div>

  <script>
    fetch('data/policies.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);

        const p = data.refund_policy;
        const timelineRows = Object.entries(p.refund_timelines)
          .map(([method, timeline]) => `<tr><td>${method}</td><td>${timeline}</td></tr>`)
          .join('');

        document.getElementById('policy-content').innerHTML = `
          <div class="card">
            <h2>Refund Policy</h2>
            <p class="meta">ID: ${p.policy_id} · Version ${p.version} · Effective ${p.effective_date}</p>
            <div class="summary">${p.summary}</div>
            <a class="link-btn" href="return-policy.html">View full policy page</a>
          </div>

          <div class="card">
            <h2>Eligibility</h2>
            <ul>${p.eligibility.map(i => `<li>${i}</li>`).join('')}</ul>
          </div>

          <div class="card">
            <h2>Refund timelines by payment method</h2>
            <table>
              <thead><tr><th>Method</th><th>Timeline</th></tr></thead>
              <tbody>${timelineRows}</tbody>
            </table>
          </div>

          <div class="card">
            <h2>Non-refundable categories</h2>
            <ul>${p.non_refundable_categories.map(i => `<li>${i}</li>`).join('')}</ul>
          </div>

          <div class="card">
            <h2>Contact</h2>
            <p>${p.contact.email} · ${p.contact.phone} · ${p.contact.hours}</p>
          </div>
        `;
      });
  </script>
</body>
</html>
