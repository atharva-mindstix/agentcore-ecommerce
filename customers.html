<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f4f6f8; color: #1a1a2e; padding: 1.5rem; }
    .container { max-width: 960px; margin: 0 auto; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
    h1 { font-size: 1.4rem; }
    a.back { color: #2563eb; text-decoration: none; font-size: 0.9rem; }
    a.back:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #e8ecf0; font-size: 0.9rem; }
    th { background: #2563eb; color: #fff; font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .tier { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .tier.GOLD { background: #fef3c7; color: #92400e; }
    .tier.STANDARD { background: #e2e8f0; color: #475569; }
    .json-section { margin-top: 2rem; }
    .json-section h2 { font-size: 1rem; margin-bottom: 0.5rem; color: #555; }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.8rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Customers</h1>
      <a class="back" href="index.html">← Back to Home</a>
    </header>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Tier</th>
          <th>City</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>

    <div class="json-section">
      <h2>Raw JSON (for agent fetch)</h2>
      <pre id="json-output"></pre>
    </div>
  </div>

  <script type="application/json" id="page-data"></script>
  <script>
    fetch('data/customers.json')
      .then(r => r.json())
      .then(customers => {
        document.getElementById('page-data').textContent = JSON.stringify(customers);
        document.getElementById('json-output').textContent = JSON.stringify(customers, null, 2);

        const tbody = document.getElementById('table-body');
        customers.forEach(c => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${c.customer_id}</td>
            <td>${c.name}</td>
            <td>${c.email}</td>
            <td>${c.phone}</td>
            <td><span class="tier ${c.tier}">${c.tier}</span></td>
            <td>${c.address.city}, ${c.address.state}</td>
            <td>${c.joined_date}</td>
          `;
          tbody.appendChild(tr);
        });
      });
  </script>
</body>
</html>
